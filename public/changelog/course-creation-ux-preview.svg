<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      text, tspan { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" rx="12" fill="#ffffff"/>

  <!-- Page container -->
  <rect x="40" y="20" width="1200" height="680" rx="10" fill="#ffffff"/>

  <!-- ── Top bar with buttons ── -->
  <rect x="880" y="30" width="80" height="32" rx="8" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <text x="900" y="51" font-size="12" font-weight="500" fill="#71717a">Cancel</text>
  <rect x="972" y="30" width="120" height="32" rx="8" fill="#18181b"/>
  <text x="993" y="51" font-size="12" font-weight="500" fill="#ffffff">Create course</text>

  <!-- ── Section: Basic Info ── -->
  <text x="60" y="98" font-size="15" font-weight="600" fill="#09090b">Basic info</text>

  <!-- Card: Basic info -->
  <rect x="60" y="110" width="1140" height="88" rx="10" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>

  <!-- Course name field -->
  <text x="84" y="140" font-size="13" font-weight="500" fill="#09090b">Course name</text>
  <text x="84" y="157" font-size="11" fill="#a1a1aa">The public name of your course.</text>
  <rect x="520" y="124" width="380" height="36" rx="8" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <text x="536" y="147" font-size="13" fill="#09090b">Complete Photography Masterclass</text>

  <!-- Separator -->
  <line x1="84" y1="172" x2="1176" y2="172" stroke="#f4f4f5" stroke-width="1"/>

  <!-- Category field -->
  <text x="84" y="192" font-size="13" font-weight="500" fill="#09090b">Category</text>
  <rect x="520" y="176" width="200" height="36" rx="8" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <text x="536" y="199" font-size="13" fill="#09090b">Photography</text>
  <polyline points="700,192 706,198 712,192" fill="none" stroke="#71717a" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── Section: Structure ── -->
  <text x="60" y="240" font-size="15" font-weight="600" fill="#09090b">Structure</text>
  <text x="60" y="258" font-size="12" fill="#a1a1aa">Add modules and lessons to organize your course content.</text>

  <!-- ── Tip banner (green) ── -->
  <rect x="60" y="270" width="1140" height="52" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-opacity="0.3" stroke-width="1"/>
  <!-- Lightbulb icon -->
  <circle cx="88" cy="290" r="8" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="88" y1="284" x2="88" y2="288" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="85" y1="298" x2="91" y2="298" stroke="#22c55e" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="86" y1="301" x2="90" y2="301" stroke="#22c55e" stroke-width="1.3" stroke-linecap="round"/>
  <text x="108" y="291" font-size="12" font-weight="600" fill="#09090b">Pro tip</text>
  <text x="108" y="307" font-size="11.5" fill="#71717a">Use modules to group related lessons. Think of them as chapters in a book — each one covering a specific topic.</text>

  <!-- ── Stats bar ── -->
  <rect x="60" y="334" width="1140" height="40" rx="10" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <text x="84" y="359" font-size="12" font-weight="500" fill="#09090b">2 modules • 5 lessons</text>
  <rect x="1068" y="342" width="116" height="26" rx="6" fill="#18181b"/>
  <text x="1083" y="360" font-size="11" font-weight="500" fill="#ffffff">+ Add module</text>

  <!-- ── Module 1 ── -->
  <rect x="60" y="386" width="1140" height="230" rx="10" fill="#fafafa" stroke="#e4e4e7" stroke-width="1"/>

  <!-- Module 1 header -->
  <!-- Grip icon -->
  <line x1="82" y1="404" x2="82" y2="404" stroke="#d4d4d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="86" y1="404" x2="86" y2="404" stroke="#d4d4d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="82" y1="408" x2="82" y2="408" stroke="#d4d4d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="86" y1="408" x2="86" y2="408" stroke="#d4d4d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="82" y1="412" x2="82" y2="412" stroke="#d4d4d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="86" y1="412" x2="86" y2="412" stroke="#d4d4d8" stroke-width="2" stroke-linecap="round"/>
  <text x="100" y="413" font-size="13" font-weight="600" fill="#09090b">Getting Started</text>
  <!-- 3-dot menu -->
  <circle cx="1170" cy="408" r="1.5" fill="#a1a1aa"/>
  <circle cx="1174" cy="408" r="1.5" fill="#a1a1aa"/>
  <circle cx="1178" cy="408" r="1.5" fill="#a1a1aa"/>

  <!-- Lesson 1.1 -->
  <line x1="60" y1="428" x2="1200" y2="428" stroke="#e4e4e7" stroke-width="1"/>
  <rect x="60" y="428" width="1140" height="48" fill="#ffffff"/>
  <rect x="132" y="438" width="56" height="28" rx="4" fill="#f4f4f5" stroke="#e4e4e7" stroke-opacity="0.5" stroke-width="0.5"/>
  <!-- Play icon -->
  <polygon points="155,448 155,460 165,454" fill="#d4d4d8"/>
  <text x="200" y="457" font-size="13" fill="#09090b">Welcome to the Course</text>
  <!-- X button -->
  <line x1="1172" y1="448" x2="1180" y2="456" stroke="#d4d4d8" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="1180" y1="448" x2="1172" y2="456" stroke="#d4d4d8" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Lesson 1.2 -->
  <line x1="60" y1="476" x2="1200" y2="476" stroke="#f4f4f5" stroke-width="1"/>
  <rect x="60" y="476" width="1140" height="48" fill="#ffffff"/>
  <rect x="132" y="486" width="56" height="28" rx="4" fill="#f4f4f5" stroke="#e4e4e7" stroke-opacity="0.5" stroke-width="0.5"/>
  <polygon points="155,496 155,508 165,502" fill="#d4d4d8"/>
  <text x="200" y="505" font-size="13" fill="#09090b">Camera Basics &amp; Settings</text>
  <line x1="1172" y1="496" x2="1180" y2="504" stroke="#d4d4d8" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="1180" y1="496" x2="1172" y2="504" stroke="#d4d4d8" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Lesson 1.3 -->
  <line x1="60" y1="524" x2="1200" y2="524" stroke="#f4f4f5" stroke-width="1"/>
  <rect x="60" y="524" width="1140" height="48" fill="#ffffff"/>
  <rect x="132" y="534" width="56" height="28" rx="4" fill="#f4f4f5" stroke="#e4e4e7" stroke-opacity="0.5" stroke-width="0.5"/>
  <polygon points="155,544 155,556 165,550" fill="#d4d4d8"/>
  <text x="200" y="553" font-size="13" fill="#09090b">Understanding Light &amp; Exposure</text>
  <line x1="1172" y1="544" x2="1180" y2="552" stroke="#d4d4d8" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="1180" y1="544" x2="1172" y2="552" stroke="#d4d4d8" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Add lesson button -->
  <line x1="60" y1="572" x2="1200" y2="572" stroke="#f4f4f5" stroke-width="1"/>
  <rect x="60" y="572" width="1140" height="44" rx="0 0 10 10" fill="#ffffff"/>
  <text x="160" y="599" font-size="12" font-weight="500" fill="#3b82f6">+ Add lesson</text>

  <!-- ── Module 2 ── -->
  <rect x="60" y="628" width="1140" height="64" rx="10" fill="#fafafa" stroke="#e4e4e7" stroke-width="1"/>

  <!-- Module 2 header -->
  <line x1="82" y1="652" x2="82" y2="652" stroke="#d4d4d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="86" y1="652" x2="86" y2="652" stroke="#d4d4d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="82" y1="656" x2="82" y2="656" stroke="#d4d4d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="86" y1="656" x2="86" y2="656" stroke="#d4d4d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="82" y1="660" x2="82" y2="660" stroke="#d4d4d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="86" y1="660" x2="86" y2="660" stroke="#d4d4d8" stroke-width="2" stroke-linecap="round"/>
  <text x="100" y="665" font-size="13" font-weight="600" fill="#09090b">Advanced Techniques</text>
  <circle cx="1170" cy="660" r="1.5" fill="#a1a1aa"/>
  <circle cx="1174" cy="660" r="1.5" fill="#a1a1aa"/>
  <circle cx="1178" cy="660" r="1.5" fill="#a1a1aa"/>
</svg>