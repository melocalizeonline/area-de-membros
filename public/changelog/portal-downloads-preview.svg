<svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1440" height="900" fill="#ffffff"/>

  <!-- CustomerPortalHeader -->
  <rect width="1440" height="64" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="60" cy="32" r="16" fill="#000000"/>
  <text x="90" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif" font-size="15" font-weight="600" fill="#1f2937">Meu Workspace</text>
  <text x="1360" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif" font-size="13" fill="#6b7280" text-anchor="end">Perfil</text>

  <!-- Main Content - Centered container -->
  <g transform="translate(240, 100)">
    <!-- Back Button -->
    <g>
      <rect x="0" y="0" width="100" height="40" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
      <text x="14" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif" font-size="13" font-weight="500" fill="#374151">← Voltar</text>
    </g>

    <!-- Card: Downloads Container -->
    <g transform="translate(0, 70)">
      <defs>
        <filter id="cardShadow" x="-50%" y="-50%" width="200%" height="200%">
          <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.06"/>
        </filter>
      </defs>

      <!-- Card Border -->
      <rect width="960" height="520" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#cardShadow)"/>

      <!-- Card Header Section -->
      <rect width="960" height="56" rx="8 8 0 0" fill="#f9fafb"/>
      <text x="24" y="37" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif" font-size="16" font-weight="600" fill="#111827">Arquivos para download</text>

      <!-- Divider -->
      <line x1="0" y1="56" x2="960" y2="56" stroke="#e5e7eb" stroke-width="1"/>

      <!-- Files List (CardContent) -->
      <g transform="translate(24, 72)">

        <!-- FILE ITEM 1 -->
        <g>
          <rect width="912" height="60" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" x="0" y="0"/>

          <!-- Left section: Icon + Text -->
          <g transform="translate(16, 18)">
            <!-- File Icon -->
            <rect x="0" y="0" width="20" height="24" rx="2" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
            <line x1="10" y1="2" x2="10" y2="22" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="6" y1="8" x2="14" y2="8" stroke="#9ca3af" stroke-width="1"/>
            <line x1="6" y1="13" x2="14" y2="13" stroke="#9ca3af" stroke-width="1"/>
            <line x1="6" y1="18" x2="14" y2="18" stroke="#9ca3af" stroke-width="1"/>

            <!-- File Name & Size -->
            <text x="32" y="12" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif" font-size="13" font-weight="500" fill="#111827">product-guide.pdf</text>
            <text x="32" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif" font-size="11" fill="#9ca3af">2.4 MB</text>
          </g>

          <!-- Right section: Download Button -->
          <g transform="translate(812, 14)">
            <rect width="84" height="32" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
            <!-- Download icon -->
            <g transform="translate(10, 7)">
              <line x1="6" y1="1" x2="6" y2="12" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/>
              <polyline points="2,8 6,12 10,8" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </g>
            <text x="26" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif" font-size="12" font-weight="500" fill="#374151">Download</text>
          </g>
        </g>

        <!-- SPACING: space-y-3 -->
        <g transform="translate(0, 72)">
          <!-- FILE ITEM 2 -->
          <g>
            <rect width="912" height="60" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" x="0" y="0"/>

            <!-- Left section: Icon + Text -->
            <g transform="translate(16, 18)">
              <!-- File Icon -->
              <rect x="0" y="0" width="20" height="24" rx="2" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
              <line x1="10" y1="2" x2="10" y2="22" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="6" y1="8" x2="14" y2="8" stroke="#9ca3af" stroke-width="1"/>
              <line x1="6" y1="13" x2="14" y2="13" stroke="#9ca3af" stroke-width="1"/>
              <line x1="6" y1="18" x2="14" y2="18" stroke="#9ca3af" stroke-width="1"/>

              <!-- File Name & Size -->
              <text x="32" y="12" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif" font-size="13" font-weight="500" fill="#111827">templates.zip</text>
              <text x="32" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif" font-size="11" fill="#9ca3af">1.8 MB</text>
            </g>

            <!-- Right section: Download Button -->
            <g transform="translate(812, 14)">
              <rect width="84" height="32" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
              <!-- Download icon -->
              <g transform="translate(10, 7)">
                <line x1="6" y1="1" x2="6" y2="12" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/>
                <polyline points="2,8 6,12 10,8" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </g>
              <text x="26" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif" font-size="12" font-weight="500" fill="#374151">Download</text>
            </g>
          </g>
        </g>

        <!-- SPACING: space-y-3 -->
        <g transform="translate(0, 144)">
          <!-- FILE ITEM 3 -->
          <g>
            <rect width="912" height="60" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" x="0" y="0"/>

            <!-- Left section: Icon + Text -->
            <g transform="translate(16, 18)">
              <!-- File Icon -->
              <rect x="0" y="0" width="20" height="24" rx="2" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
              <line x1="10" y1="2" x2="10" y2="22" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="6" y1="8" x2="14" y2="8" stroke="#9ca3af" stroke-width="1"/>
              <line x1="6" y1="13" x2="14" y2="13" stroke="#9ca3af" stroke-width="1"/>
              <line x1="6" y1="18" x2="14" y2="18" stroke="#9ca3af" stroke-width="1"/>

              <!-- File Name & Size -->
              <text x="32" y="12" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif" font-size="13" font-weight="500" fill="#111827">aula-5-template.docx</text>
              <text x="32" y="26" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif" font-size="11" fill="#9ca3af">512 KB</text>
            </g>

            <!-- Right section: Download Button -->
            <g transform="translate(812, 14)">
              <rect width="84" height="32" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
              <!-- Download icon -->
              <g transform="translate(10, 7)">
                <line x1="6" y1="1" x2="6" y2="12" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round"/>
                <polyline points="2,8 6,12 10,8" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </g>
              <text x="26" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif" font-size="12" font-weight="500" fill="#374151">Download</text>
            </g>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- TenantPublicFooter -->
  <rect y="820" width="1440" height="80" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="240" y="850" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif" font-size="12" fill="#6b7280">© 2026 Meu Workspace. Todos os direitos reservados.</text>

  <!-- Social Icons in footer -->
  <g transform="translate(1200, 845)">
    <circle cx="0" cy="0" r="5" fill="none" stroke="#d1d5db" stroke-width="1"/>
    <circle cx="20" cy="0" r="5" fill="none" stroke="#d1d5db" stroke-width="1"/>
    <circle cx="40" cy="0" r="5" fill="none" stroke="#d1d5db" stroke-width="1"/>
  </g>
</svg>
